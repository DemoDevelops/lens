name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --bin lens --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staged
          cp "target/${{ matrix.target }}/release/lens" staged/lens
          cp staged/lens "staged/lens-${{ matrix.target }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lens-${{ matrix.target }}
          path: staged/lens
          if-no-files-found: error
      - name: Attach binary to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: staged/lens-${{ matrix.target }}
          fail_on_unmatched_files: true

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage npm packages
        run: node npm/scripts/build-packages.mjs
        env:
          VERSION: ${{ env.RELEASE_TAG }}
      - name: Publish (platform packages first, then the launcher)
        run: |
          set -e
          for d in npm/dist/lens-mcp-*/; do
            echo "publishing $d"
            npm publish "$d" --access public
          done
          echo "publishing npm/dist/lens-mcp/"
          npm publish npm/dist/lens-mcp/ --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
